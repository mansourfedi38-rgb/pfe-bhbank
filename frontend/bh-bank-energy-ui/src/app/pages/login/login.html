<div class="login-page">
  <div class="login-box">
    <div class="login-header">
      <h1>{{ 'login.title' | translate }}</h1>
      <p>{{ 'login.subtitle' | translate }}</p>
    </div>

    <form class="login-form" (ngSubmit)="goToDashboard()">
      <div class="form-group">
        <label for="email">{{ 'login.emailLabel' | translate }}</label>
        <input
          id="email"
          type="email"
          [attr.placeholder]="'login.emailPlaceholder' | translate"
          required
        />
      </div>

      <div class="form-group">
        <label for="password">{{ 'login.passwordLabel' | translate }}</label>
        <input
          id="password"
          type="password"
          [attr.placeholder]="'login.passwordPlaceholder' | translate"
          required
        />
      </div>

      <div class="form-options">
        <label class="remember-me">
          <input type="checkbox" />
          <span>{{ 'login.rememberMe' | translate }}</span>
        </label>

        <a href="#" class="forgot-password">{{ 'login.forgotPassword' | translate }}</a>
      </div>

      <button type="submit" class="login-btn">{{ 'login.signIn' | translate }}</button>
    </form>

    <div class="login-footer">
      <p>{{ 'login.footer' | translate }}</p>
    </div>
  </div>
</div>
