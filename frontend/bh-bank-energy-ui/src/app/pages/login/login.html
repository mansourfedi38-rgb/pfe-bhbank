<div class="login-page">
  <div class="login-layout">
    <section class="brand-panel">
      <div class="brand-content">
        <div class="logo-area">
      <img src="assets/images/logo-footer.png" alt="BH Bank Logo" style="height: 50px; width: auto;" />
    </div>

        <div class="brand-badge">BH BANK ENERGY PLATFORM</div>

        <h1>{{ 'login.title' | translate }}</h1>
        <p>{{ 'login.subtitle' | translate }}</p>

        <div class="brand-features">
          <div class="feature-card">
            <span class="feature-title">Monitoring</span>
            <span class="feature-value">Sensors & Agencies</span>
          </div>

          <div class="feature-card">
            <span class="feature-title">Analytics</span>
            <span class="feature-value">Energy & Reports</span>
          </div>
        </div>
      </div>
    </section>

    <section class="form-panel">
      <div class="login-box">
        <div class="login-header">
          <div class="mini-brand">BH BANK</div>
          <h2>{{ 'login.signIn' | translate }}</h2>
          <p>{{ 'login.footer' | translate }}</p>
        </div>

        <form class="login-form" (ngSubmit)="goToDashboard()">
          <div class="form-group">
            <label for="email">{{ 'login.emailLabel' | translate }}</label>
            <input
              id="email"
              type="email"
              [attr.placeholder]="'login.emailPlaceholder' | translate"
              required
            />
          </div>

          <div class="form-group">
            <label for="password">{{ 'login.passwordLabel' | translate }}</label>
            <input
              id="password"
              type="password"
              [attr.placeholder]="'login.passwordPlaceholder' | translate"
              required
            />
          </div>

          <div class="form-options">
            <label class="remember-me">
              <input type="checkbox" />
              <span>{{ 'login.rememberMe' | translate }}</span>
            </label>

            <a href="#" class="forgot-password">{{ 'login.forgotPassword' | translate }}</a>
          </div>

          <button type="submit" class="login-btn">{{ 'login.signIn' | translate }}</button>
        </form>
      </div>
    </section>
  </div>
</div>
