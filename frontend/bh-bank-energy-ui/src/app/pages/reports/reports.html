<div class="reports-page">
  <aside class="sidebar">
    <h2>BH Bank</h2>

    <ul>
      <li>
        <a routerLink="/dashboard" routerLinkActive="active">Dashboard</a>
      </li>
      <li>
        <a routerLink="/sensors" routerLinkActive="active">Sensors</a>
      </li>
      <li>
        <a routerLink="/energy-usage" routerLinkActive="active">Energy Usage</a>
      </li>
      <li>
        <a routerLink="/reports" routerLinkActive="active">Reports</a>
      </li>
      <li>
        <a routerLink="/settings" routerLinkActive="active">Settings</a>
      </li>
    </ul>

    <div class="logout">
      <button (click)="logout()">Logout</button>
    </div>
  </aside>

  <main class="main-content">
    <header class="topbar">
      <h1>Reports & Analytics</h1>
      <p>Review operational summaries and energy performance reports for BH Bank agencies.</p>
    </header>

    <section class="cards">
      <div class="card">
        <h3>Daily Report</h3>
        <p>Available</p>
      </div>

      <div class="card">
        <h3>Weekly Report</h3>
        <p>Generated</p>
      </div>

      <div class="card">
        <h3>Monthly Analysis</h3>
        <p>Updated</p>
      </div>

      <div class="card">
        <h3>Performance Score</h3>
        <p>89%</p>
      </div>
    </section>
  </main>
</div>
