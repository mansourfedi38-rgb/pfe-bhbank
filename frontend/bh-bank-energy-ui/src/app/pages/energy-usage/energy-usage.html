<div class="energy-page">
  <aside class="sidebar">
    <h2>BH Bank</h2>

    <ul>
      <li>
        <a routerLink="/dashboard" routerLinkActive="active">Dashboard</a>
      </li>
      <li>
        <a routerLink="/sensors" routerLinkActive="active">Sensors</a>
      </li>
      <li>
        <a routerLink="/energy-usage" routerLinkActive="active">Energy Usage</a>
      </li>
      <li>
        <a routerLink="/reports" routerLinkActive="active">Reports</a>
      </li>
      <li>
        <a routerLink="/settings" routerLinkActive="active">Settings</a>
      </li>
    </ul>

    <div class="logout">
      <button (click)="logout()">Logout</button>
    </div>
  </aside>

  <main class="main-content">
    <header class="topbar">
      <h1>Energy Usage Overview</h1>
      <p>Monitor energy consumption and optimization across BH Bank agencies.</p>
    </header>

    <section class="cards">
      <div class="card">
        <h3>Today Consumption</h3>
        <p>245 kWh</p>
      </div>

      <div class="card">
        <h3>Weekly Consumption</h3>
        <p>1,620 kWh</p>
      </div>

      <div class="card">
        <h3>Monthly Average</h3>
        <p>6,840 kWh</p>
      </div>

      <div class="card">
        <h3>Optimization Rate</h3>
        <p>18%</p>
      </div>
    </section>
  </main>
</div>
