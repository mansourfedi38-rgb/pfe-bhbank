<div class="language-switcher" [class.compact]="compact" [attr.dir]="selectedLanguage === 'ar' ? 'rtl' : 'ltr'">
  @if (!compact) {
    <label for="languageSelect">{{ 'languageSelector.label' | translate }}</label>
  }

  <select
    id="languageSelect"
    [ngModel]="selectedLanguage"
    (ngModelChange)="onLanguageChange($event)"
  >
    <option value="en">{{ 'languageSelector.english' | translate }}</option>
    <option value="fr">{{ 'languageSelector.french' | translate }}</option>
    <option value="ar">{{ 'languageSelector.arabic' | translate }}</option>
  </select>
</div>
